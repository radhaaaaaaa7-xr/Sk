<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Afsar Bind Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1e1e2f; }
        .container { background-color: #2a2a40; width: 400px; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
        .button-box { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 2px solid #3a3a5c; }
        .toggle-btn { background: transparent; border: none; outline: none; cursor: pointer; font-size: 18px; font-weight: bold; padding: 10px 0; width: 50%; color: #888; }
        .active-btn { color: #00d2ff; border-bottom: 3px solid #00d2ff; }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        .input-field { width: 100%; padding: 12px; border: none; border-radius: 5px; background-color: #3a3a5c; color: white; font-size: 16px; outline: none; }
        .input-field:focus { outline: 2px solid #00d2ff; }
        .submit-btn { width: 100%; padding: 12px; background-color: #00d2ff; color: #1e1e2f; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background-color: #00a8cc; }
        #signupForm { display: none; }
        .msg { text-align: center; margin-bottom: 15px; font-weight: bold; }
        .error { color: #ff4c4c; }
        .success { color: #00ff66; }
    </style>
</head>
<body>
    <div class="container">
        {% if error %} <div class="msg error">{{ error }}</div> {% endif %}
        {% if success %} <div class="msg success">{{ success }}</div> {% endif %}

        <div class="button-box">
            <button class="toggle-btn active-btn" id="loginBtn" onclick="showLogin()">Sign In</button>
            <button class="toggle-btn" id="signupBtn" onclick="showSignup()">Sign Up</button>
        </div>

        <form id="loginForm" class="input-group" method="POST" action="/login">
            <input type="email" name="email" class="input-field" placeholder="Email ID" required>
            <input type="password" name="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <form id="signupForm" class="input-group" method="POST" action="/signup">
            <input type="text" name="name" class="input-field" placeholder="Full Name" required>
            <input type="email" name="email" class="input-field" placeholder="Email ID" required>
            <input type="password" name="password" class="input-field" placeholder="Create Password" required>
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>

    <script>
        function showLogin() {
            document.getElementById("loginForm").style.display = "flex";
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginBtn").classList.add("active-btn");
            document.getElementById("signupBtn").classList.remove("active-btn");
        }
        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "flex";
            document.getElementById("signupBtn").classList.add("active-btn");
            document.getElementById("loginBtn").classList.remove("active-btn");
        }
    </script>
</body>
</html>
